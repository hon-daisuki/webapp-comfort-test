<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scalse=1, shrink-to-fit=no">
	<link rel="stylesheet" href="../css/bootstrap.min.css">
	<title>管理者への一言サイト</title>
</head>
<body>
	<div class="container">
		<form>
			<div class="form-group col">
				<input type="text" class="form-control" placeholder="投稿者名">
			</div>
			<select class="form-select" id="selectPrefecture" aria-label="都道府県の選択">
				<option selected disabled>性別</option>
				<option value="1">男性</option>
				<option value="2">女性</option>
				<option value="3">無回答</option>
			</select>
			<div class="form-group col">
				<input type="password" class="form-control" placeholder="管理者へのメッセージ">
			</div>
			<div class="form-group col">
				<input type="password" class="form-control" placeholder="メッセージ削除用パスワード">
			</div>
			
			<button type="submit" class="btn btn-primary">送信</button>
		</form>
	</div>
	
	<script src="../js/jquery-3.7.1.slim.min.js"></script>
	<script src="../js/bootstrap.bundle.min.js"></script>
</body>
</html>
