<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者への一言メッセージ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">マイサイト</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">自己紹介</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="message.html">管理者への一言メッセージ</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            その他リンク
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">趣味のページ（未実装）</a></li>
                            <li><a class="dropdown-item" href="#">ブログ（未実装）</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <h1>管理者への一言メッセージ</h1>
        <p>メッセージをどうぞ。</p>

        <form>
            <div class="mb-3">
                <label class="form-label">お名前
				</label>
                <input type="text" class="form-control" placeholder="お名前を入力">
            </div>

            <div class="mb-3">
                <label class="form-label">性別</label>
                <select class="form-select">
                    <option selected>選択してください</option>
                    <option value="male">男性</option>
                    <option value="female">女性</option>
                    <option value="other">その他</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">メッセージ</label>
                <textarea class="form-control" rows="3" placeholder="一言どうぞ"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">削除用パスワード</label>
                <input type="password" class="form-control" placeholder="パスワード">
            </div>

            <button type="button" class="btn btn-primary">送信する</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
