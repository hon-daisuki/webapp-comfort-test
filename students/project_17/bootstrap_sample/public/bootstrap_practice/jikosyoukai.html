<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>蛙吹梅雨の自己紹介</title>
  <style>
    body {
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
    }

    header {
      background-color: #ffb6c1;
      padding: 16px 24px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav {
      background-color: #ff8da1;
      padding: 8px 24px;
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      margin-right: 24px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 800px;
      margin: 24px auto 40px;
      background-color: #ffffff;
      padding: 24px 32px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      box-sizing: border-box;
    }

    h2 {
      border-left: 6px solid #ff8da1;
      padding-left: 8px;
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 32px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px 10px;
      text-align: left;
    }

    th {
      background-color: #ffe4ec;
    }
    
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .form-group textarea {
      height: 120px;
      resize: vertical;
    }

    .submit-btn {
      background-color: #007bff;
      color: #ffffff;
      border: none;
      padding: 10px 24px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background-color: #0064cc;
    }
  </style>
</head>
<body>

  <header>
    <h1>蛙吹梅雨の自己紹介</h1>
  </header>

  <nav>
    <a href="#home">ホーム</a>
    <a href="#products">自己紹介</a>
    <a href="#contact">一言メッセージ</a>
  </nav>

  <main>
    <section id="products">
      <h2>自己紹介</h2>
      <table>
        <thead>
          <tr>
            <th>名前</th>
            <th>誕生日</th>
            <th>個性</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>蛙吹梅雨</td>
            <td>2月12日</td>
            <td>蛙</td>
          </tr>
          <tr>
            <td>雄英高校ヒーロー科1年A組</td>
            <td>ゼリー</td>
            <td>冷静で率直</td>
          </tr>
        </tbody>
      </table>
    </section>
    <section id="contact">
      <h2>一言メッセージ</h2>
      <form onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="name">名前</label>
          <input id="name" type="text" placeholder="名前を入力してください" required>
        </div>

		<div class="form-group">
          <label for="name">性別</label>
          <input id="name" type="text" placeholder="性別を入力してください" required>
        </div>
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input id="email" type="email" placeholder="メールアドレスを入力してください" required>
        </div>

        <div class="form-group">
          <label for="message">メッセージ</label>
          <textarea id="message" placeholder="メッセージを入力してください" required></textarea>
        </div>

        <button type="submit" class="submit-btn">送信</button>
      </form>
    </section>
  </main>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      alert("自己紹介を見てくれてありがとう！");
    }
  </script>

</body>
</html>
