	<h2>一言メッセージ</h2>
	<div class="container">
		<form>

			<!-- 投稿者名 -->
			<div class="col-6">
				<label class="form-label">投稿者名</label>
				<input type="text" class="form-control" name="username" placeholder="お名前を入力">
			</div>

			<!-- 性別（ドロップダウン） -->
			<div class="col-6">
				<label class="form-label">性別</label>
				<select class="form-select" name="gender">
					<option value="">選択してください</option>
					<option value="male">男性</option>
					<option value="female">女性</option>
					<option value="other">その他</option>
				</select>
			</div>

			<!-- メッセージ -->
			<div class="mb-3">
				<label class="form-label">メッセージ</label>
				<textarea class="form-control" name="message" rows="4" placeholder="メッセージを入力"></textarea>
			</div>

			<!-- 削除用パスワード -->
			<div class="col-6">
				<label class="form-label">削除用パスワード</label>
				<input type="password" class="form-control" name="delete_pass" placeholder="4桁の数字など">
			</div>

			<!-- 送信ボタン -->
			<button type="submit" class="btn btn-primary">送信</button>

		</form>

	</div>
	<script src="../js/jquery-3.7.1.slim.min.js"></script>
	<script src="../js/bootstrap.bundle.min.js"></script>
</body>
