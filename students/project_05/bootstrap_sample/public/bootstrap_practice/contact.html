<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="boot.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="boot.html">My Site</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item dropdown">

                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">メニュー</a>

                        <ul class="dropdown-menu">

                            <li>
                                <a class="dropdown-item" href="boot.html">自己紹介</a>
                            </li>
                            
                            <li>
                                <a class="dropdown-item" href="contact.html">問い合わせ</a>
                            </li>

                        </ul>

                    </li>

                </ul>

            </div>

        </div>

    </nav>


    <header>

        <h1>問い合わせ</h1>

    </header>


    <div class="container mt-5">

        <section id="contact">
			
            <div class="row">

                <div class="col-md-8 mx-auto">
					
					<form>

					    <div class="row">
					
					        <div class="col-md-6 mb-3">
					
					            <label class="form-label">名前</label>
					
					            <input type="text" class="form-control">
					
					        </div>
					
					        <div class="col-md-6 mb-3">
					
					            <label class="form-label">性別</label>
					
					            <select class="form-select">
					
					                <option>選択してください</option>
					                <option>男性</option>
					                <option>女性</option>
					
					            </select>
					
					        </div>
					
					    </div>
					    <div class="mb-3">
					
					        <label class="form-label">メッセージ</label>
					
					        <textarea class="form-control" rows="4"></textarea>
					
					    </div>
					
					
					    <div class="mb-3">
					
					        <label class="form-label">パスワード</label>
					
					        <input type="password" class="form-control">
					
					    </div>
					
					
					    <button type="submit" class="btn btn-primary">送信</button>
					
					</form>
	
                </div>

            </div>

        </section>

    </div>

    <script src="../js/jquery-4.0.0.slim.min.js"></script>
	<script src="../js/bootstrap.bundle.min.js"></script>

</body>
