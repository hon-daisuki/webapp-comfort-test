<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介サイト - 管理者への一言メッセージ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">My Profile</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">自己紹介</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="message.html">管理者への一言メッセージ</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            その他リンク
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">趣味の部屋（遷移なし）</a></li>
                            <li><a class="dropdown-item" href="#">制作実績（遷移なし）</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h1 class="h2 mb-4 text-center">管理者への一言メッセージ</h1>
                
                <form onsubmit="return false;">
                    
                    <div class="row row-cols-1 row-cols-md-2 g-3 mb-3">
                        <div class="col">
                            <label for="authorName" class="form-label">投稿者名</label>
                            <input type="text" class="form-control" id="authorName" placeholder="お名前を入力してください">
                        </div>
                        
                        <div class="col">
                            <label for="genderSelect" class="form-label">性別</label>
                            <select class="form-select" id="genderSelect">
                                <option selected disabled value="">選択してください</option>
                                <option value="male">男性</option>
                                <option value="female">女性</option>
                                <option value="other">その他・回答しない</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="messageText" class="form-label">メッセージ</label>
                        <textarea class="form-control" id="messageText" rows="4" placeholder="メッセージを一言お願いします"></textarea>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="deletePassword" class="form-label">削除用パスワード</label>
                            <input type="password" class="form-control" id="deletePassword" placeholder="パスワード（半角英数）">
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary px-5">メッセージを送信する</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
