<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scalse=1, shrink-to-fit=no">
	<link rel="stylesheet" href="../css/bootstrap.min.css">
	<title>自己紹介</title>
</head>
<body>
	<div class="container">
		<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<ul class="navbar-nav">
			<li class="nav-item"><a class="nav-link" href="#about1">自己紹介</a></li>
			<li class="nav-item"><a class="nav-link" href="#about2">一言メッセージ</a></li>
			<li class="nav-item dropdown">
			<a class="nav-link dropdown-toggle" href="" data-bs-toggle="dropdown">ここから選択</a>
			<ul class="dropdown-menu">
				<li><a class="dropdown-item" href="#about1">自己紹介</a></li>
				<li><a class="dropdown-item" href="#about2">一言メッセージ</a></li>
			</ul>
			</li>
		</ul>
		</nav>
		<table class="table" id="about1">
			<thead>
				<tr>
					<th colspan="2">
					<h2>自己紹介</h2>
					</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>名前</td>
					<td>緑谷出久</td>
				</tr>
				<tr>
					<td>年齢</td>
					<td>19歳</td>
				</tr>
				<tr>
					<td>出身</td>
					<td>沖縄県</td>
				</tr>
				<tr>
					<td>趣味</td>
					<td>
						エイサー見に行くこと、
						三線を弾くこと、
						音楽を聞く、
						ネイル
					</td>
			</tbody>
		</table>
		<form>
			<h2 id="about2">一言メッセージ</h2>
			<div class="row">
				<div class="col">
					<div class="form-group">
						<label for="username">投稿者名</label>
						<input type="text" class="form-control" id="username">
					</div>
				</div>
				<div class="col">
					<div class="form-group">
						<label for="hometown">性別</label>
						<select class="form-control" id="hometown">
							<option>男性</option>
							<option>女性</option>
							<option>無回答</option>
						</select>
					</div>
				</div>
				<div class="col">
					<div class="form-group">
						<label for="password">パスワード</label>
						<input type="password" class="form-control" id="deletePassword">
					</div>
				</div>
					<div class="form-group">
						<label for="massage">メッセージ</label>
						<textarea class="form-control" id="message" rows="4" placeholder="メッセージを入力してください"></textarea>
					</div>
			</div>
		<button type="submit" class="btn btn-primary">送信</button>
		</form>
	</div>
	<script src="../js/jquery-4.0.0.slim.min.js"></script>
	<script src="../js/bootstrap.bundle.min.js"></script>

</body>
</html>
