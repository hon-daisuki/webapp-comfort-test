<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者への一言メッセージ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .main-wrapper { border: 1px solid #000; padding: 40px; background-color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="boot.html">KOHEI.Y HP</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="boot.html">自己紹介</a></li>
                    <li class="nav-item"><a class="nav-link active" href="message.html">管理者への一言</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="main-wrapper shadow">
            <h1 class="fw-bold mb-5 border-bottom border-dark pb-2">一言メッセージ</h1>
            
            <!-- 追加要件1&2: グリッドシステム & ブレイクポイント -->
            <!-- 画面幅md(768px)以上で横並び、未満で縦積み -->
            <form>
                <div class="row g-4">
                    <!-- 投稿者名 -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">投稿者名</label>
                        <input type="text" class="form-control" placeholder="お名前を入力">
                    </div>

                    <!-- 要件2: 性別（ドロップダウン） -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">性別</label>
                        <select class="form-select">
                            <option value="1">男</option>
                            <option value="2">女</option>
                            <option value="3">回答しない</option>
                        </select>
                    </div>

                    <!-- メッセージ -->
                    <div class="col-12">
                        <label class="form-label fw-bold">メッセージ</label>
                        <textarea class="form-control" rows="5" placeholder="メッセージを入力してください"></textarea>
                    </div>

                    <!-- 削除用パスワード -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">削除用パスワード</label>
                        <input type="password" class="form-control" placeholder="パスワードを入力">
                    </div>

                    <!-- 要件3: ボタン -->
                    <div class="col-12 text-center mt-5">
                        <button type="button" class="btn btn-primary btn-lg px-5">送信</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
