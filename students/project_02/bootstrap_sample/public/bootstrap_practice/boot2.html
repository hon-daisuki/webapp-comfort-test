<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>管理者への一言メッセージ</title>
<link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>
	<div class="container">
		<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
			<ul class="navbar-nav">
				<li class="nav-item"><a class="nav-link text-white" href="boot.html">自己紹介を見る！</a></li>
				<li class="nav-item dropdown"><a class="nav-link dropdown-toggle text-white" href="" data-bs-toggle="dropdown">一言メッセージについて</a>
					<div class="dropdown-menu">
						<a class="dropdown-item" href="">Q＆A</a>
						<a class="dropdown-item" href="">注意事項</a>
					</div>
				</li>
			</ul>
		</nav>
		<h2 class="text-primary-emphasis">管理者への一言メッセージ</h2>
		<form>
			<div class="form-group">
				<label for="username">ユーザー名</label>
				<input type="text" class="form-control w-50" id="username" placeholder="名前を入力してください">
			</div>
			<div class="form-group">
				<label for="hometown">性別</label>
				<select class="form-control w-50" id="hometown">
					<option>無回答</option>
					<option>男</option>
					<option>女</option>
				</select>
			</div>
			<div class="form-group">
				<label for="password">パスワード</label>
				<input type="text" class="form-control" id="password">
			</div>
			<div class="form-group">
				<label for="message">メッセージ</label>
				<textarea class="form-control" rows="5" id="message" placeholder="なんか書いてください"></textarea>
			</div>
			<button class="btn btn-dark">送信する</button>
		</form>
	</div>
	<script src="../js/jquery-3.7.1.slim.min.js"></script>
	<script src="../js/bootstrap.bundle.min.js"></script>
</body>
</html>
