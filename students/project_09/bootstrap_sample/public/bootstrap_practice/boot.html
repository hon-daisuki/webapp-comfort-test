<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>匡のページ</title>

<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">俺のページ</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link active" href="#">ホーム</a>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">

            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#">これは</a></li>
              <li><a class="dropdown-item" href="#">課題の為だから</a></li>
              <li><a class="dropdown-item" href="#">機能しな～い</a></li>
            </ul>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">

    <div class="card shadow">
      <div class="card-body">

        <h1 class="text-center mb-4">自己紹介</h1>

        <p class="lead">
          こんにちは！僕の名前は中曽根匡。google pixelを使ってます。
        </p>

        <hr>

        <h2 class="mt-4">好きなもの</h2>
        <table class="table table-bordered mt-3">
          <thead class="table-secondary">
            <tr>
              <th>カテゴリ</th>
              <th>内容</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>スポーツ</td>
              <td>サッカー（マンチェスター・ユナイテッド）バスケ（ウォリアーズ）</td>
            </tr>
            <tr>
              <td>食べ物、飲み物</td>
              <td>ラーメン、コーヒー（セロリは苦手）</td>
            </tr>
            <tr>
              <td>趣味</td>
              <td>スポーツ観戦、漫画</td>
            </tr>
          </tbody>
        </table>

        <hr>
       
        <h2 class="mt-4">お問い合わせ</h2>

        <form class="mt-3">

          <div class="mb-3">
            <input type="text" class="form-control" placeholder="お名前" required>
          </div>

          <div class="mb-3">
            <textarea class="form-control" rows="3" placeholder="メッセージ" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100">送信</button>

        </form>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
